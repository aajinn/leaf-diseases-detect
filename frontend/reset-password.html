<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Leaf Disease Detection</title>
    <link rel="icon" type="image/x-icon" href="leaf-16.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#059669',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-leaf text-primary text-3xl mr-3"></i>
                    <span class="text-2xl font-bold text-gray-800">Leaf Disease Detection</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-primary">Home</a>
                    <a href="/login" class="text-primary font-semibold">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Reset Password Form -->
    <div class="max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-2xl p-6">
            <div class="text-center mb-6">
                <i class="fas fa-key text-primary text-4xl mb-3"></i>
                <h2 class="text-2xl font-bold text-gray-800">Reset Password</h2>
                <p class="text-gray-600 mt-1">Enter your new password</p>
            </div>

            <form id="resetPasswordForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">New Password</label>
                    <div class="relative">
                        <input type="password" id="newPassword" required
                            class="w-full px-3 py-2 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Enter new password">
                        <button type="button" onclick="togglePassword('newPassword')" 
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none">
                            <i id="newPassword-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">
                        Password must be at least 8 characters with uppercase, lowercase, number, and special character
                    </p>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-1">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" required
                            class="w-full px-3 py-2 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                            placeholder="Confirm new password">
                        <button type="button" onclick="togglePassword('confirmPassword')" 
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none">
                            <i id="confirmPassword-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="resetBtn"
                    class="w-full bg-primary text-white py-2 rounded-lg font-semibold hover:bg-secondary transition shadow-lg">
                    Reset Password
                </button>
            </form>

            <div id="message" class="mt-3 p-3 rounded-lg hidden"></div>

            <p class="text-center text-gray-600 mt-4">
                Remember your password? 
                <a href="/login" class="text-primary font-semibold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showMessage('Invalid reset link. Please request a new password reset.', 'error');
            document.getElementById('resetBtn').disabled = true;
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';
            
            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(data.detail || 'Failed to reset password', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Reset Password';
                }
            } catch (error) {
                showMessage('An error occurred. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
            }
        });

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.className = `mt-4 p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            message.textContent = text;
            message.classList.remove('hidden');
        }
    </script>
</body>
</html>
